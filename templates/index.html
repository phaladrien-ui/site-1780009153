Voici le code HTML5 complet pour une landing page e-commerce de montres de luxe, design luxe et responsive.
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Horloger·e · Montres de luxe</title>
    <!-- Google Fonts : Playfair Display + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (gratuit) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            background-color: #f7f5f0;
            color: #1e1b18;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* ----- UTILITIES ----- */
        .gold-accent {
            color: #b58d5b;
        }

        .section-title {
            font-size: 2.4rem;
            font-weight: 400;
            letter-spacing: 0.06em;
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background: #b58d5b;
            margin-top: 0.75rem;
        }

        .btn-primary {
            display: inline-block;
            background: transparent;
            border: 1px solid #b58d5b;
            color: #b58d5b;
            padding: 0.9rem 2.8rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #b58d5b;
            color: #fff;
        }

        .btn-dark {
            background: #1e1b18;
            border-color: #1e1b18;
            color: #f7f5f0;
        }

        .btn-dark:hover {
            background: #b58d5b;
            border-color: #b58d5b;
            color: #fff;
        }

        /* ----- HEADER / NAV ----- */
        .header {
            padding: 1.5rem 0;
            border-bottom: 1px solid rgba(181, 141, 91, 0.2);
            background: #f7f5f0;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: #1e1b18;
        }

        .logo span {
            color: #b58d5b;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            font-weight: 400;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .nav-links a {
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #b58d5b;
        }

        .header-icons {
            display: flex;
            gap: 1.5rem;
            font-size: 1.2rem;
            color: #1e1b18;
        }

        .header-icons i {
            transition: color 0.2s;
            cursor: pointer;
        }

        .header-icons i:hover {
            color: #b58d5b;
        }

        /* ----- HERO SECTION ----- */
        .hero {
            padding: 4rem 0 5rem;
            background: #f7f5f0;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .hero-content h1 {
            font-size: 3.8rem;
            font-weight: 400;
            line-height: 1.2;
            letter-spacing: 0.02em;
            margin-bottom: 1.5rem;
        }

        .hero-content h1 i {
            font-style: italic;
            font-weight: 300;
            color: #b58d5b;
        }

        .hero-description {
            font-size: 1.1rem;
            font-weight: 300;
            color: #3a3530;
            margin-bottom: 2.5rem;
            max-width: 90%;
        }

        .hero-cta {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .hero-image {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e8e2d6;
            border-radius: 4px;
            padding: 2rem 1rem;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.1);
            position: relative;
        }

        .hero-image img {
            width: 100%;
            max-width: 480px;
            object-fit: contain;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.08));
        }

        .hero-badge {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: #1e1b18;
            color: #f7f5f0;
            padding: 0.5rem 1.2rem;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-radius: 30px;
        }

        /* ----- COLLECTION (grille produits) ----- */
        .collection {
            padding: 5rem 0;
            background: #ffffff;
        }

        .collection-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .product-card {
            background: #faf8f5;
            padding: 2rem 1.5rem 1.8rem;
            transition: all 0.25s ease;
            border: 1px solid #ece7e0;
            text-align: center;
        }

        .product-card:hover {
            border-color: #b58d5b;
            box-shadow: 0 12px 28px -8px rgba(181, 141, 91, 0.12);
            transform: translateY(-3px);
        }

        .product-image {
            margin-bottom: 1.8rem;
            display: flex;
            justify-content: center;
            min-height: 200px;
            align-items: center;
        }

        .product-image img {
            max-height: 220px;
            object-fit: contain;
            transition: transform 0.4s;
        }

        .product-card:hover .product-image img {
            transform: scale(1.02);
        }

        .product-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 400;
            margin-bottom: 0.25rem;
        }

        .product-material {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #7a7168;
            margin-bottom: 0.75rem;
        }

        .product-price {
            font-size: 1.3rem;
            font-weight: 500;
            color: #1e1b18;
        }

        .product-price .currency {
            font-size: 0.9rem;
            font-weight: 300;
            color: #b58d5b;
        }

        .product-card .btn-primary {
            margin-top: 1.2rem;
            padding: 0.6rem 2rem;
            font-size: 0.75rem;
        }

        /* ----- SAVOIR-FAIRE / ÉLÉGANCE ----- */
        .heritage {
            padding: 5rem 0;
            background: #f7f5f0;
        }

        .heritage-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .heritage-image {
            background: #ddd6cb;
            padding: 2rem;
            border-radius: 2px;
            display: flex;
            justify-content: center;
        }

        .heritage-image img {
            max-height: 380px;
            object-fit: contain;
        }

        .heritage-text h2 {
            font-size: 2.8rem;
            margin-bottom: 1.5rem;
        }

        .heritage-text p {
            font-size: 1.05rem;
            color: #3a3530;
            margin-bottom: 2rem;
            max-width: 90%;
        }

        .signature {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            color: #b58d5b;
        }

        /* ----- NEWSLETTER / ÉLÉGANCE ----- */
        .newsletter {
            padding: 4rem 0;
            background: #1e1b18;
            color: #f7f5f0;
            text-align: center;
        }

        .newsletter h3 {
            font-size: 2.2rem;
            font-weight: 400;
            margin-bottom: 0.75rem;
        }

        .newsletter p {
            font-weight: 300;
            opacity: 0.8;
            margin-bottom: 2rem;
        }

        .newsletter-form {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            max-width: 500px;
            margin: 0 auto;
        }

        .newsletter-form input {
            flex: 1;
            padding: 0.9rem 1.5rem;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: #f7f5f0;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }

        .newsletter-form input::placeholder {
            color: rgba(247,245,240,0.6);
        }

        .newsletter-form input:focus {
            border-color: #b58d5b;
        }

        .newsletter-form button {
            background: #b58d5b;
            border: none;
            color: #1e1b18;
            font-weight: 600;
            padding: 0 2rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.8rem;
        }

        .newsletter-form button:hover {
            background: #c9a87c;
        }

        /* ----- FOOTER ----- */
        .footer {
            background: #f7f5f0;
            border-top: 1px solid #e2dbd0;
            padding: 3rem 0 2rem;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 2rem;
        }

        .footer-brand .logo {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .footer-brand p {
            font-size: 0.9rem;
            color: #5a524a;
            max-width: 260px;
        }

        .footer-col h4 {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.2rem;
            color: #1e1b18;
        }

        .footer-col a {
            display: block;
            font-size: 0.9rem;
            font-weight: 300;
            color: #3a3530;
            margin-bottom: 0.6rem;
            transition: color 0.2s;
        }

        .footer-col a:hover {
            color: #b58d5b;
        }

        .footer-bottom {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e2dbd0;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: #5a524a;
        }

        .footer-social i {
            font-size: 1.2rem;
            margin-left: 1rem;
            transition: color 0.2s;
            cursor: pointer;
        }

        .footer-social i:hover {
            color: #b58d5b;
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 1024px) {
            .hero-content h1 {
                font-size: 3rem;
            }
            .collection-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .footer-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 820px) {
            .hero-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .hero-content h1 {
                font-size: 2.8rem;
            }
            .hero-description {
                max-width: 100%;
                margin-left: auto;
                margin-right: auto;
            }
            .hero-cta {
                justify-content: center;
            }
            .hero-image {
                order: -1;
                padding: 1.5rem;
            }
            .hero-image img {
                max-width: 300px;
            }
            .heritage-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .heritage-text p {
                max-width: 100%;
            }
            .section-title::after {
                margin-left: auto;
                margin-right: auto;
            }
            .collection-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 0 1.2rem;
            }
            .header-inner {
                flex-direction: column;
                gap: 1rem;
            }
            .nav-links {
                gap: 1.5rem;
                flex-wrap: wrap;
                justify-content: center;
            }
            .hero-content h1 {
                font-size: 2.2rem;
            }
            .collection-grid {
                grid-template-columns: 1fr;
                max-width: 400px;
                margin: 0 auto;
            }
            .footer-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .footer-brand p {
                max-width: 100%;
            }
            .footer-bottom {
                flex-direction: column;
                align-items: center;
                gap: 0.8rem;
            }
            .footer-social i {
                margin: 0 0.6rem;
            }
            .newsletter-form {
                flex-direction: column;
                align-items: center;
            }
            .newsletter-form input {
                width: 100%;
            }
            .newsletter-form button {
                padding: 0.9rem 2rem;
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .hero-content h1 {
                font-size: 1.9rem;
            }
            .btn-primary {
                padding: 0.7rem 1.8rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body
